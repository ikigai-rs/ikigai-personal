# CI for ikigai-personal. Published crate linked into both the native CLI and
# the browser web-demo, so a regression could ride into the publish cascade or
# break a host's wasm build. Check both faces.
name: ci

on:
  pull_request:
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2

      - name: fmt
        run: cargo fmt --all -- --check

      - name: clippy (native, all targets)
        run: cargo clippy --all-targets -- -D warnings

      - name: test
        run: cargo test

      - name: clippy (wasm lib)
        run: cargo clippy --lib --target wasm32-unknown-unknown -- -D warnings
